name: psychosocial_monitor
description: Avaliação de Riscos Psicossociais COPSOQ - RC Engenharia - Segurança do Trabalho e Saúde Ocupacional
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: 6.1.5+1
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0
  http: 1.5.0
  uuid: ^4.3.3
  intl: ^0.19.0
  fl_chart: ^0.69.0
  pdf: ^3.11.1
  printing: ^5.13.2
  path_provider: ^2.1.4
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  web: ^1.1.0
  firebase_core: 3.6.0
  cloud_firestore: 5.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
